apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-processing-scheduler
  labels:
    app: job-scheduler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: job-scheduler
  template:
    metadata:
      labels:
        app: job-scheduler
    spec:
      containers:
      - name: job-api
        image: registry.digitalocean.com/job-processing-scheduler:latest
        ports:
        - containerPort: 8080
        env:
        - name: JAVA_OPTS
          value: "-Xmx512m -Xms256m"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/jobs
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/jobs
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: job-scheduler-service
spec:
  selector:
    app: job-scheduler
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
